<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Vibe">
<title>Vibe</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070a;
  --surface: rgba(255,255,255,0.045);
  --border: rgba(255,255,255,0.08);
  --text: #f2f2f5;
  --muted: rgba(255,255,255,0.38);
  --green: #1DB954;
  --cyan: #00e0ff;
  --pink: #ff2d78;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; }
body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow: hidden; position: fixed; width: 100%; height: 100%; }
#bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: drift linear infinite; }
.o1 { width: 400px; height: 400px; background: #1DB954; top: -100px; left: -80px; animation-duration: 22s; }
.o2 { width: 350px; height: 350px; background: #00e0ff; bottom: -80px; right: -60px; animation-duration: 28s; animation-delay: -8s; }
.o3 { width: 280px; height: 280px; background: #ff2d78; top: 40%; left: 60%; animation-duration: 18s; animation-delay: -4s; }
@keyframes drift { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(30px,-40px) scale(1.08); } 66% { transform: translate(-20px,30px) scale(0.95); } 100% { transform: translate(0,0) scale(1); } }
#app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
.screen { display: none; flex-direction: column; height: 100%; overflow: hidden; }
.screen.active { display: flex; }
.app-header { padding: 18px 20px 12px; flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; line-height: 1; background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.5)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.logo span { background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.tagline { font-size: 12px; font-weight: 400; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 20px; }
.scroll::-webkit-scrollbar { display: none; }
.sec-label { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 12px; margin-top: 4px; display: block; }
#s-connect { justify-content: center; align-items: center; padding: 32px 24px; text-align: center; }
.connect-logo { font-family: 'Bebas Neue', sans-serif; font-size: 72px; letter-spacing: 4px; line-height: 1; background: linear-gradient(135deg, #fff 30%, rgba(255,255,255,0.4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
.connect-logo span { background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.connect-tag { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 48px; }
.btn-spotify { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--green); color: #000; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 16px; padding: 18px 36px; border-radius: 100px; border: none; width: 100%; max-width: 280px; margin: 0 auto; cursor: pointer; box-shadow: 0 8px 32px rgba(29,185,84,0.35); transition: transform 0.15s; -webkit-appearance: none; }
.btn-spotify:active { transform: scale(0.97); }
.pl-item { display: flex; align-items: center; gap: 14px; padding: 13px 16px; border-radius: 14px; margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; -webkit-user-select: none; user-select: none; }
.pl-item.selected { background: rgba(29,185,84,0.1); border-color: rgba(29,185,84,0.35); }
.pl-img { width: 48px; height: 48px; border-radius: 10px; flex-shrink: 0; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden; }
.pl-img img { width: 100%; height: 100%; object-fit: cover; }
.pl-info { flex: 1; min-width: 0; }
.pl-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
.pl-check { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s; }
.pl-item.selected .pl-check { background: var(--green); border-color: var(--green); }
.pl-item.selected .pl-check::after { content: ''; display: block; width: 6px; height: 4px; border-left: 2px solid #000; border-bottom: 2px solid #000; transform: rotate(-45deg) translate(1px, -1px); }
.bottom-bar { flex-shrink: 0; padding: 12px 16px; padding-bottom: max(12px, var(--safe-bottom)); background: linear-gradient(to top, rgba(7,7,10,0.98) 70%, transparent); }
.btn-load { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--green); color: #000; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 15px; padding: 16px; border-radius: 14px; border: none; width: 100%; cursor: pointer; box-shadow: 0 6px 24px rgba(29,185,84,0.3); transition: transform 0.15s, opacity 0.15s; -webkit-appearance: none; }
.btn-load:disabled { opacity: 0.4; }
.btn-load:active:not(:disabled) { transform: scale(0.98); }
.genre-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.gc { border-radius: 16px; padding: 16px 14px 13px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); cursor: pointer; position: relative; overflow: hidden; transition: transform 0.18s, border-color 0.2s, background 0.2s; -webkit-user-select: none; user-select: none; }
.gc:active { transform: scale(0.96); }
.gc.active { border-color: var(--gc-c); background: var(--gc-bg); box-shadow: 0 0 20px var(--gc-sh); }
.gc-glow { position: absolute; inset: 0; border-radius: 16px; background: var(--gc-bg); opacity: 0; transition: opacity 0.25s; }
.gc.active .gc-glow { opacity: 1; }
.gc-icon { font-size: 26px; margin-bottom: 8px; display: block; position: relative; z-index: 1; }
.gc-name { font-size: 13px; font-weight: 700; display: block; position: relative; z-index: 1; line-height: 1.2; margin-bottom: 3px; }
.gc-count { font-size: 11px; color: var(--muted); position: relative; z-index: 1; }
.gc.active .gc-count { color: var(--gc-c); }
.tracks-header { flex-shrink: 0; padding: 16px 20px 10px; }
.back-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 10px; cursor: pointer; border: none; background: none; font-family: 'Outfit', sans-serif; padding: 0; -webkit-appearance: none; }
.tracks-title { font-family: 'Bebas Neue', sans-serif; font-size: 40px; letter-spacing: 1px; line-height: 1; }
.tracks-title span { background: linear-gradient(135deg, var(--active-c, var(--green)), var(--active-c2, var(--cyan))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.shuffle-bar { flex-shrink: 0; padding: 0 16px 12px; }
.btn-shuffle { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--green); color: #000; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px; padding: 14px; border-radius: 12px; border: none; width: 100%; cursor: pointer; box-shadow: 0 4px 20px rgba(29,185,84,0.28); transition: transform 0.15s; -webkit-appearance: none; }
.btn-shuffle:active { transform: scale(0.97); }
.track-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 12px; margin-bottom: 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.track-item:active { background: rgba(255,255,255,0.06); }
.track-num { font-size: 12px; color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
.track-art { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); display: block; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.track-play { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; background: rgba(29,185,84,0.15); border: 1px solid rgba(29,185,84,0.3); display: flex; align-items: center; justify-content: center; }
.track-play svg { margin-left: 2px; }
#now-playing { display: none; flex-shrink: 0; background: rgba(20,20,26,0.95); border-top: 1px solid rgba(255,255,255,0.08); padding: 10px 16px; padding-bottom: max(10px, var(--safe-bottom)); backdrop-filter: blur(20px); }
#now-playing.visible { display: block; }
.np-inner { display: flex; align-items: center; gap: 12px; }
.np-art { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.08); }
.np-info { flex: 1; min-width: 0; }
.np-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-controls { display: flex; align-items: center; gap: 14px; }
.np-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; -webkit-appearance: none; }
.np-play-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--green); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 14px rgba(29,185,84,0.4); transition: transform 0.12s; -webkit-appearance: none; }
.np-play-btn:active { transform: scale(0.93); }
.np-progress { height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; margin-top: 8px; overflow: hidden; }
.np-progress-bar { height: 100%; background: var(--green); border-radius: 1px; width: 0%; transition: width 1s linear; }
#loading-overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(7,7,10,0.92); backdrop-filter: blur(10px); flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
#loading-overlay.show { display: flex; }
.loader-logo { font-family: 'Bebas Neue', sans-serif; font-size: 56px; letter-spacing: 3px; background: linear-gradient(135deg, var(--green), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.loader-msg { font-size: 13px; color: var(--muted); letter-spacing: 1px; text-align: center; padding: 0 32px; }
.loader-bar { width: 160px; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden; }
.loader-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); border-radius: 1px; width: 0%; transition: width 0.4s ease; }
#toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,30,40,0.95); border: 1px solid var(--border); color: var(--text); font-size: 13px; padding: 10px 20px; border-radius: 100px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 200; max-width: 90vw; text-align: center; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.fade-up { animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both; }
</style>
</head>
<body>
<div id="bg"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div id="app">

  <div id="s-connect" class="screen active">
    <div class="connect-logo">VIB<span>E</span></div>
    <div class="connect-tag">What's your vibe?</div>
    <button class="btn-spotify" onclick="connectSpotify()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Connect with Spotify
    </button>
  </div>

  <div id="s-playlists" class="screen">
    <div class="app-header"><div class="logo">VIB<span>E</span></div><div class="tagline">What's your vibe?</div></div>
    <div class="scroll"><span class="sec-label">Choose your playlists</span><div id="pl-list"></div></div>
    <div class="bottom-bar"><button class="btn-load" id="load-btn" onclick="loadSelectedPlaylists()" disabled>Select playlists to continue</button></div>
  </div>

  <div id="s-genres" class="screen">
    <div class="app-header"><div class="logo">VIB<span>E</span></div><div class="tagline" id="genre-tagline">What's your vibe?</div></div>
    <div class="scroll"><span class="sec-label">Pick a genre</span><div class="genre-grid" id="genre-grid"></div></div>
  </div>

  <div id="s-tracks" class="screen">
    <div class="tracks-header">
      <button class="back-btn" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        Back to genres
      </button>
      <div class="tracks-title" id="tracks-title"><span>All</span></div>
    </div>
    <div class="shuffle-bar">
      <button class="btn-shuffle" onclick="shufflePlay()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        Shuffle Play
      </button>
    </div>
    <div class="scroll" id="track-scroll"><div id="track-list"></div></div>
  </div>

  <div id="now-playing">
    <div class="np-inner">
      <img class="np-art" id="np-art" src="" alt="">
      <div class="np-info"><div class="np-name" id="np-name">—</div><div class="np-artist" id="np-artist">—</div></div>
      <div class="np-controls">
        <button class="np-btn" onclick="prevTrack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
        <button class="np-play-btn" onclick="togglePlay()"><svg id="np-play-icon" width="16" height="16" viewBox="0 0 24 24" fill="#000"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
        <button class="np-btn" onclick="nextTrack()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
      </div>
    </div>
    <div class="np-progress"><div class="np-progress-bar" id="np-bar"></div></div>
  </div>
</div>

<div id="loading-overlay"><div class="loader-logo">VIBE</div><div class="loader-msg" id="loader-msg">Loading…</div><div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div></div>
<div id="toast"></div>

<script>
const CLIENT_ID = '9f04234438d341199ab78a31e7a9527a';
const REDIRECT_URI = 'https://stevemon23.github.io/Vibe/';
const SCOPES = 'playlist-read-private playlist-read-collaborative user-modify-playback-state user-read-playback-state';

let token = null, allPlaylists = [], selectedIds = new Set(), allTracks = [], activeGenre = 'All', genreMap = {}, queue = [], qIdx = 0, playing = false, progInterval = null, tStart = 0, tDur = 0;

const GS = {
  'All':{icon:'🔥',c:'#1DB954',c2:'#00e0ff',bg:'rgba(29,185,84,.12)',sh:'rgba(29,185,84,.2)'},
  'Hip-Hop / Rap':{icon:'🎤',c:'#ffd60a',c2:'#ff9500',bg:'rgba(255,214,10,.1)',sh:'rgba(255,214,10,.18)'},
  'R&B / Soul':{icon:'🎷',c:'#ff2d78',c2:'#bf5af2',bg:'rgba(255,45,120,.1)',sh:'rgba(255,45,120,.18)'},
  'Pop':{icon:'✨',c:'#00e0ff',c2:'#1DB954',bg:'rgba(0,224,255,.1)',sh:'rgba(0,224,255,.18)'},
  'Rock / Indie':{icon:'🎸',c:'#ff6b35',c2:'#ffd60a',bg:'rgba(255,107,53,.1)',sh:'rgba(255,107,53,.18)'},
  'Metal':{icon:'🤘',c:'#ff3333',c2:'#ff6b35',bg:'rgba(255,51,51,.1)',sh:'rgba(255,51,51,.18)'},
  'Electronic / Dance':{icon:'⚡',c:'#bf5af2',c2:'#00e0ff',bg:'rgba(191,90,242,.1)',sh:'rgba(191,90,242,.18)'},
  'Jazz':{icon:'🎺',c:'#ffd60a',c2:'#ff6b35',bg:'rgba(255,214,10,.08)',sh:'rgba(255,214,10,.14)'},
  'Classical':{icon:'🎻',c:'#e5c56e',c2:'#bf5af2',bg:'rgba(229,197,110,.08)',sh:'rgba(229,197,110,.14)'},
  'Country':{icon:'🤠',c:'#c8a96e',c2:'#ffd60a',bg:'rgba(200,169,110,.08)',sh:'rgba(200,169,110,.14)'},
  'Reggae':{icon:'🌿',c:'#1DB954',c2:'#ffd60a',bg:'rgba(29,185,84,.1)',sh:'rgba(29,185,84,.18)'},
  'Latin':{icon:'🌶️',c:'#ff6b35',c2:'#ffd60a',bg:'rgba(255,107,53,.1)',sh:'rgba(255,107,53,.18)'},
  'Afrobeats':{icon:'🥁',c:'#ff9500',c2:'#ff2d78',bg:'rgba(255,149,0,.1)',sh:'rgba(255,149,0,.18)'},
  'Folk / Acoustic':{icon:'🪕',c:'#a8d48a',c2:'#1DB954',bg:'rgba(168,212,138,.08)',sh:'rgba(168,212,138,.14)'},
  'Gospel':{icon:'🙏',c:'#ffd60a',c2:'#ff9500',bg:'rgba(255,214,10,.08)',sh:'rgba(255,214,10,.14)'},
  'Blues':{icon:'🎵',c:'#5ac8fa',c2:'#00e0ff',bg:'rgba(90,200,250,.08)',sh:'rgba(90,200,250,.14)'},
  'Funk':{icon:'🕺',c:'#ff2d78',c2:'#ffd60a',bg:'rgba(255,45,120,.1)',sh:'rgba(255,45,120,.18)'},
  'Other':{icon:'🎧',c:'#8e8e93',c2:'#636366',bg:'rgba(142,142,147,.07)',sh:'rgba(142,142,147,.12)'},
};
const gs = g => GS[g] || GS['Other'];

function simplify(g) {
  const r = [
    [/hip.?hop|rap|trap|drill|grime/i,'Hip-Hop / Rap'],
    [/r&b|rnb|soul|neo.?soul/i,'R&B / Soul'],
    [/pop/i,'Pop'],
    [/rock|punk|grunge|indie|alternative|emo/i,'Rock / Indie'],
    [/metal|heavy|hardcore|screamo/i,'Metal'],
    [/electr|house|techno|edm|dance|dubstep|dnb|drum.?and.?bass|trance|synth/i,'Electronic / Dance'],
    [/jazz/i,'Jazz'],[/classic|orchestr|symphon/i,'Classical'],
    [/country|bluegrass|americana/i,'Country'],[/reggae|dub|dancehall/i,'Reggae'],
    [/latin|salsa|reggaeton|cumbia|bossa|samba/i,'Latin'],
    [/afrobeat|afropop|afro/i,'Afrobeats'],
    [/folk|acoustic|singer.?songwriter/i,'Folk / Acoustic'],
    [/gospel|christian|worship/i,'Gospel'],[/blues/i,'Blues'],[/funk|groove/i,'Funk'],
  ];
  for (const [re,l] of r) if (re.test(g)) return l;
  return 'Other';
}

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function showLoader(m,p=0) { document.getElementById('loading-overlay').classList.add('show'); document.getElementById('loader-msg').textContent=m; document.getElementById('loader-fill').style.width=p+'%'; }
function setLoader(m,p) { document.getElementById('loader-msg').textContent=m; document.getElementById('loader-fill').style.width=p+'%'; }
function hideLoader() { document.getElementById('loading-overlay').classList.remove('show'); }
let toastT; function showToast(m) { const el=document.getElementById('toast'); el.textContent=m; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),4000); }

// PKCE AUTH
function b64url(buf) { return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
async function connectSpotify() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(48)));
  const challenge = b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
  localStorage.setItem('vibe_v', verifier);
  window.location.href = 'https://accounts.spotify.com/authorize?' + new URLSearchParams({
    client_id: CLIENT_ID, response_type: 'code',
    redirect_uri: REDIRECT_URI, scope: SCOPES,
    code_challenge_method: 'S256', code_challenge: challenge
  });
}

async function exchangeToken(code) {
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams({
      client_id: CLIENT_ID, grant_type: 'authorization_code',
      code, redirect_uri: REDIRECT_URI,
      code_verifier: localStorage.getItem('vibe_v')
    })
  });
  const d = await r.json();
  if (!d.access_token) throw new Error(d.error_description || JSON.stringify(d));
  token = d.access_token;
  localStorage.setItem('vibe_tok', token);
  localStorage.setItem('vibe_tok_t', Date.now().toString());
  localStorage.removeItem('vibe_v');
}

// API
async function api(url) {
  const r = await fetch(url, {headers:{Authorization:'Bearer '+token}});
  if (r.status===401) { token=null; localStorage.removeItem('vibe_tok'); show('s-connect'); throw new Error('401'); }
  if (!r.ok) throw new Error('API '+r.status);
  return r.json();
}
async function apiPut(url, body) { return fetch(url,{method:'PUT',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(body)}); }

// PLAYLISTS
async function loadPlaylists() {
  let items=[], url='https://api.spotify.com/v1/me/playlists?limit=50';
  while(url){const d=await api(url);items=items.concat(d.items.filter(Boolean));url=d.next;}
  return items;
}

function renderPlaylists() {
  const c=document.getElementById('pl-list'); c.innerHTML='';
  allPlaylists.forEach((pl,i)=>{
    const div=document.createElement('div');
    div.className='pl-item fade-up'; div.style.animationDelay=i*0.04+'s';
    const img=pl.images?.[0]?.url;
    const isSp=pl.owner?.id==='spotify';
    div.innerHTML=`<div class="pl-img">${img?`<img src="${img}" alt="">`:(isSp?'⭐':'🎵')}</div><div class="pl-info"><div class="pl-name">${pl.name}</div><div class="pl-meta">${pl.tracks.total} songs${isSp?' · By Spotify':''}</div></div><div class="pl-check"></div>`;
    div.onclick=()=>{
      if(selectedIds.has(pl.id)){selectedIds.delete(pl.id);div.classList.remove('selected');}
      else{selectedIds.add(pl.id);div.classList.add('selected');}
      const n=selectedIds.size, btn=document.getElementById('load-btn');
      btn.disabled=n===0; btn.textContent=n===0?'Select playlists to continue':`Load ${n} playlist${n>1?'s':''} →`;
    };
    c.appendChild(div);
  });
}

// TRACKS
async function fetchTracks(pid) {
  let items=[], url=`https://api.spotify.com/v1/playlists/${pid}/tracks?limit=50&fields=next,items(track(id,name,uri,duration_ms,album(images),artists(id,name)))`;
  while(url){const d=await api(url);items=items.concat(d.items.filter(i=>i.track?.id));url=d.next;}
  return items;
}

async function loadSelectedPlaylists() {
  showLoader('Loading tracks…', 5);
  try {
    let raw=[];
    const pids=[...selectedIds];
    for(let i=0;i<pids.length;i++){
      setLoader(`Loading playlist ${i+1} of ${pids.length}…`, 5+(i/pids.length)*30);
      raw=raw.concat(await fetchTracks(pids[i]));
    }
    const seen=new Set();
    raw=raw.filter(t=>{if(seen.has(t.track.id))return false;seen.add(t.track.id);return true;});
    setLoader(`${raw.length} tracks — loading genres…`, 35);

    const aids=[...new Set(raw.flatMap(i=>i.track.artists.map(a=>a.id)))];
    const gmap={};
    for(let i=0;i<aids.length;i+=50){
      setLoader(`Genres… ${Math.min(i+50,aids.length)}/${aids.length}`, 35+(i/aids.length)*60);
      const d=await api(`https://api.spotify.com/v1/artists?ids=${aids.slice(i,i+50).join(',')}`);
      d.artists.forEach(a=>{if(a)gmap[a.id]=a.genres||[];});
    }

    allTracks=raw.map(item=>({
      ...item,
      genres:[...new Set(item.track.artists.flatMap(a=>gmap[a.id]||[]))],
      simplified:[]
    }));

    genreMap={};
    allTracks.forEach(t=>{
      const g=[...new Set(t.genres.map(simplify))];
      if(!g.length)g.push('Other');
      t.simplified=g;
      g.forEach(x=>{if(!genreMap[x])genreMap[x]=[];genreMap[x].push(t);});
    });

    setLoader('Done!', 100);
    setTimeout(()=>{hideLoader();renderGenres();show('s-genres');},400);
  } catch(e) {
    hideLoader();
    showToast('Error: '+e.message);
    console.error(e);
  }
}

function renderGenres() {
  const grid=document.getElementById('genre-grid'); grid.innerHTML='';
  document.getElementById('genre-tagline').textContent=allTracks.length+' songs loaded';
  const entries=[['All',allTracks],...Object.entries(genreMap).sort((a,b)=>b[1].length-a[1].length)];
  entries.forEach(([genre,tracks],i)=>{
    const s=gs(genre);
    const card=document.createElement('div');
    card.className='gc fade-up'+(activeGenre===genre?' active':'');
    card.style.cssText=`--gc-c:${s.c};--gc-bg:${s.bg};--gc-sh:${s.sh};animation-delay:${i*0.05}s`;
    card.innerHTML=`<div class="gc-glow"></div><span class="gc-icon">${s.icon}</span><span class="gc-name">${genre}</span><span class="gc-count">${tracks.length} tracks</span>`;
    card.onclick=()=>openGenre(genre);
    grid.appendChild(card);
  });
}

function openGenre(genre) {
  activeGenre=genre;
  const s=gs(genre);
  document.documentElement.style.setProperty('--active-c',s.c);
  document.documentElement.style.setProperty('--active-c2',s.c2);
  document.getElementById('tracks-title').innerHTML=`<span>${genre}</span>`;
  const tracks=genre==='All'?allTracks:(genreMap[genre]||[]);
  queue=[...tracks];
  renderTracks(tracks);
  document.getElementById('track-scroll').scrollTop=0;
  show('s-tracks');
}

function renderTracks(tracks) {
  const list=document.getElementById('track-list'); list.innerHTML='';
  tracks.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='track-item fade-up';
    div.style.animationDelay=Math.min(i*0.022,0.5)+'s';
    div.style.opacity='0';
    const img=t.track.album?.images?.[2]?.url||t.track.album?.images?.[0]?.url||'';
    const artist=t.track.artists.map(a=>a.name).join(', ');
    div.innerHTML=`<span class="track-num">${i+1}</span>${img?`<img class="track-art" src="${img}" alt="">`:'<div class="track-art"></div>'}<div class="track-info"><div class="track-name">${t.track.name}</div><div class="track-artist">${artist}</div></div><div class="track-play"><svg width="12" height="12" viewBox="0 0 24 24" fill="${gs(activeGenre).c}"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
    div.onclick=()=>playTrack(i,queue);
    list.appendChild(div);
  });
}

// PLAYBACK
async function playTrack(idx, q) {
  qIdx=idx; queue=q;
  const t=q[idx]; if(!t) return;
  try {
    const dr=await api('https://api.spotify.com/v1/me/player/devices');
    const dev=(dr.devices||[]).find(d=>d.is_active)||(dr.devices||[])[0];
    if(!dev){showToast('Open Spotify on your phone first!');return;}
    await apiPut(`https://api.spotify.com/v1/me/player/play?device_id=${dev.id}`,{uris:q.slice(idx,idx+50).map(x=>x.track.uri),offset:{position:0}});
    updateNP(t); playing=true; updateIcon(); startProg(t.track.duration_ms);
  } catch(e) {
    showToast('Opening in Spotify…');
    setTimeout(()=>{location.href=t.track.uri;},300);
  }
}

async function shufflePlay() {
  const tracks=activeGenre==='All'?allTracks:(genreMap[activeGenre]||[]);
  if(!tracks.length) return;
  playTrack(0,[...tracks].sort(()=>Math.random()-0.5));
}

async function togglePlay() {
  try {
    if(playing){await apiPut('https://api.spotify.com/v1/me/player/pause',{});playing=false;clearInterval(progInterval);}
    else{await apiPut('https://api.spotify.com/v1/me/player/play',{});playing=true;resumeProg();}
    updateIcon();
  } catch(e){showToast('Is Spotify open?');}
}

function nextTrack(){if(qIdx<queue.length-1)playTrack(qIdx+1,queue);}
function prevTrack(){if(qIdx>0)playTrack(qIdx-1,queue);}

function updateNP(t) {
  document.getElementById('np-art').src=t.track.album?.images?.[0]?.url||'';
  document.getElementById('np-name').textContent=t.track.name;
  document.getElementById('np-artist').textContent=t.track.artists.map(a=>a.name).join(', ');
  document.getElementById('now-playing').classList.add('visible');
}
function updateIcon() {
  document.getElementById('np-play-icon').innerHTML=playing
    ?'<rect x="6" y="4" width="4" height="16" fill="#000"/><rect x="14" y="4" width="4" height="16" fill="#000"/>'
    :'<polygon points="5 3 19 12 5 21 5 3"/>';
}
function startProg(ms){clearInterval(progInterval);tStart=Date.now();tDur=ms;resumeProg();}
function resumeProg(){clearInterval(progInterval);progInterval=setInterval(()=>{const p=Math.min((Date.now()-tStart)/tDur*100,100);document.getElementById('np-bar').style.width=p+'%';if(p>=100){clearInterval(progInterval);nextTrack();}},1000);}
function goBack(){show('s-genres');}

// INIT
async function init() {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const error = params.get('error');

  // Show everything on screen for debugging
  const urlInfo = 'URL: ' + location.href.slice(0,80) + 
    ' | code: ' + (code ? code.slice(0,15)+'...' : 'none') +
    ' | verifier: ' + (localStorage.getItem('vibe_v') ? 'YES' : 'NO') +
    ' | saved_tok: ' + (localStorage.getItem('vibe_tok') ? 'YES' : 'NO');
  console.log(urlInfo);

  if (error) {
    history.replaceState({}, '', REDIRECT_URI);
    alert('Spotify error: ' + error);
    return;
  }

  if (code) {
    history.replaceState({}, '', REDIRECT_URI);
    showLoader('Signing in to Spotify…', 20);
    try {
      await exchangeToken(code);
      alert('Token exchange SUCCESS! Token starts with: ' + token.slice(0,15));
    } catch(e) {
      hideLoader();
      alert('Token exchange FAILED: ' + e.message);
      return;
    }
  } else {
    const t = localStorage.getItem('vibe_tok');
    const ts = parseInt(localStorage.getItem('vibe_tok_t') || '0');
    if (t && (Date.now() - ts) < 3500000) { 
      token = t;
      console.log('Using saved token');
    } else {
      console.log('No valid saved token, showing connect screen');
      return;
    }
  }

  if (token) {
    showLoader('Loading your playlists…', 50);
    try {
      allPlaylists = await loadPlaylists();
      setLoader('Ready!', 100);
      setTimeout(() => { hideLoader(); renderPlaylists(); show('s-playlists'); }, 400);
    } catch(e) {
      hideLoader();
      alert('Playlist load FAILED: ' + e.message);
    }
  }
}

init();
</script>
